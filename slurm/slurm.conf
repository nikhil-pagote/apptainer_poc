# ─────────────────────────────────────────────────────────────────────────────
# Slurm configuration for the Docker-based HPC simulation.
# Controller: slurmctld   Compute nodes: worker1, worker2
# ─────────────────────────────────────────────────────────────────────────────

ClusterName=hpc-sim

# ── Controller ────────────────────────────────────────────────────────────────
SlurmctldHost=slurmctld

# ── Authentication ────────────────────────────────────────────────────────────
AuthType=auth/munge

# ── Process tracking ─────────────────────────────────────────────────────────
# linuxproc avoids requiring cgroup support inside Docker containers
ProctrackType=proctrack/linuxproc

# ── State / reliability ───────────────────────────────────────────────────────
ReturnToService=2

# ── PID / port files ──────────────────────────────────────────────────────────
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmctldPort=6817
SlurmdPidFile=/var/run/slurmd.pid
SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurmd
SlurmUser=root
StateSaveLocation=/var/spool/slurmctld

# ── Networking / MPI ─────────────────────────────────────────────────────────
SwitchType=switch/none
MpiDefault=none

# ── Task management ───────────────────────────────────────────────────────────
# task/none avoids cgroup / cpuset requirements inside Docker
TaskPlugin=task/none

# ── Scheduler ────────────────────────────────────────────────────────────────
SchedulerType=sched/backfill
SelectType=select/cons_tres

# ── Accounting (disabled for simplicity) ─────────────────────────────────────
AccountingStorageType=accounting_storage/none
JobAcctGatherType=jobacct_gather/none

# ── Timeouts ─────────────────────────────────────────────────────────────────
InactiveLimit=0
KillWait=30
MinJobAge=300
SlurmctldTimeout=120
SlurmdTimeout=300

# ── Logging ───────────────────────────────────────────────────────────────────
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log

# ── Compute nodes ─────────────────────────────────────────────────────────────
NodeName=worker1 CPUs=2 RealMemory=1024 State=UNKNOWN
NodeName=worker2 CPUs=2 RealMemory=1024 State=UNKNOWN

# ── Partition ─────────────────────────────────────────────────────────────────
PartitionName=debug Nodes=worker[1-2] Default=YES MaxTime=INFINITE State=UP
