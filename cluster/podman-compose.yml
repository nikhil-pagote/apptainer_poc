version: "3"

# Multi-node HPC cluster simulation
# ┌─────────────┐   ┌────────────────┐   ┌──────────────┐   ┌──────────────┐
# │  slurmctld  │   │ dask-scheduler │   │      c1      │   │      c2      │
# │  (head node)│   │ partition:     │   │ partition:   │   │ partition:   │
# │  + login    │   │ dask-scheduler │   │ dask-workers │   │ dask-workers │
# └──────┬──────┘   └───────┬────────┘   └──────┬───────┘   └──────┬───────┘
#        │                  │                   │                  │
#        └──────────────────┴───────────────────┴──────────────────┘
#                                  slurm-net
#
# slurmdbd + MariaDB provide job accounting.
# Slurm 20.11+ dropped PostgreSQL support; MariaDB/MySQL is the required backend.
# /shared is the cluster shared filesystem (equivalent to /scratch on real HPC).
# Apptainer is installed INSIDE the images — compute nodes run .sif containers natively.

services:

  # ── MariaDB: accounting database ──────────────────────────────────────────
  # Note: Slurm 20.11+ dropped PostgreSQL support. MariaDB is the required
  # backend for slurmdbd accounting storage.
  mariadb:
    image: docker.io/mariadb:11
    hostname: mariadb
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_USER: slurm
      MARIADB_PASSWORD: slurm_password
      MARIADB_DATABASE: slurm_acct_db
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - slurm-net

  # ── slurmdbd: accounting daemon ───────────────────────────────────────────
  slurmdbd:
    image: localhost/cluster_slurm
    hostname: slurmdbd
    container_name: slurmdbd
    command: slurmdbd
    volumes:
      - ./conf/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./conf/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ./conf/slurmdbd.conf:/etc/slurm/slurmdbd.conf.template:ro
      - ./conf/munge.key:/etc/munge/munge.key:ro
      - slurm-logs:/var/log/slurm
    networks:
      - slurm-net
    depends_on:
      - mariadb

  # ── slurmctld: head / login node ──────────────────────────────────────────
  slurmctld:
    image: localhost/cluster_slurm
    hostname: slurmctld
    container_name: slurmctld
    command: slurmctld
    volumes:
      - ./conf/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./conf/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ./conf/slurmdbd.conf:/etc/slurm/slurmdbd.conf:ro
      - ./conf/munge.key:/etc/munge/munge.key:ro
      - ../shared:/shared
      - slurm-state:/var/lib/slurm
      - slurm-logs:/var/log/slurm
    networks:
      - slurm-net
    depends_on:
      - slurmdbd

  # ── dask-scheduler: dedicated node for Dask scheduler partition ───────────
  dask-scheduler:
    image: localhost/cluster_slurm
    hostname: dask-scheduler
    container_name: dask-scheduler
    command: slurmd
    volumes:
      - ./conf/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./conf/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ./conf/munge.key:/etc/munge/munge.key:ro
      - ../shared:/shared
      - slurm-logs:/var/log/slurm
    security_opt:
      - apparmor=unconfined
    networks:
      - slurm-net
    depends_on:
      - slurmctld

  # ── c1: compute node 1 ────────────────────────────────────────────────────
  c1:
    image: localhost/cluster_slurm
    hostname: c1
    container_name: c1
    command: slurmd
    volumes:
      - ./conf/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./conf/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ./conf/munge.key:/etc/munge/munge.key:ro
      - ../shared:/shared
      - slurm-logs:/var/log/slurm
    security_opt:
      - apparmor=unconfined
    networks:
      - slurm-net
    depends_on:
      - slurmctld

  # ── c2: compute node 2 ────────────────────────────────────────────────────
  c2:
    image: localhost/cluster_slurm
    hostname: c2
    container_name: c2
    command: slurmd
    volumes:
      - ./conf/slurm.conf:/etc/slurm/slurm.conf:ro
      - ./conf/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ./conf/munge.key:/etc/munge/munge.key:ro
      - ../shared:/shared
      - slurm-logs:/var/log/slurm
    security_opt:
      - apparmor=unconfined
    networks:
      - slurm-net
    depends_on:
      - slurmctld


volumes:
  mariadb-data:
  slurm-state:
  slurm-logs:

networks:
  slurm-net:
    driver: bridge
