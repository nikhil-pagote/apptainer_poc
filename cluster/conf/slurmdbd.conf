# slurmdbd.conf — Slurm database daemon configuration
# This file must be 600 and owned by slurm (enforced in docker-entrypoint.sh)
# See: https://slurm.schedmd.com/slurmdbd.conf.html

AuthType=auth/munge
DbdHost=slurmdbd
DbdPort=6819
SlurmUser=slurm

LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/run/slurm/slurmdbd.pid
DebugLevel=info

StorageType=accounting_storage/mysql
StorageHost=mysql
StoragePort=3306
StorageUser=slurm
StoragePass=slurm_password
StorageLoc=slurm_acct_db
