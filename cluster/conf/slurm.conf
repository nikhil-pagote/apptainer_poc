# slurm.conf — local HPC simulation cluster
# See: https://slurm.schedmd.com/slurm.conf.html

ClusterName=hpc-poc
SlurmctldHost=slurmctld

MpiDefault=none
ProctrackType=proctrack/linuxproc
ReturnToService=2

# Allows slurmd to start even when hardware differs from config (useful in containers)
SlurmdParameters=config_overrides

SlurmctldPidFile=/var/run/slurm/slurmctld.pid
SlurmctldPort=6817
SlurmdPidFile=/var/run/slurm/slurmd.pid
SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurm
SlurmUser=slurm
SlurmdUser=slurm
StateSaveLocation=/var/lib/slurm

SwitchType=switch/none
TaskPlugin=task/none

SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# Accounting via slurmdbd + MariaDB
AccountingStorageHost=slurmdbd
AccountingStorageType=accounting_storage/slurmdbd
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log

# Compute nodes — hostnames match podman-compose service names
NodeName=c[1-2] CPUs=2 RealMemory=512 State=UNKNOWN
NodeName=dask-scheduler CPUs=2 RealMemory=512 State=UNKNOWN

# compute   — general-purpose jobs (hello, uppmax_demo)
# dask-scheduler — dedicated node for the Dask scheduler process
# dask-workers   — c1 + c2 run Dask workers
PartitionName=compute Nodes=c[1-2] Default=YES MaxTime=01:00:00 State=UP
PartitionName=dask-scheduler Nodes=dask-scheduler MaxTime=01:00:00 State=UP
PartitionName=dask-workers Nodes=c[1-2] MaxTime=01:00:00 State=UP
